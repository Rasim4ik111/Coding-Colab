<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="left">
        <form action="/signup">
          <h1>Get Started Now</h1>

          <label for="username">Name</label>
          <input type="text" name="username" placeholder="Enter your name" />

          <label for="email">Email adress</label>
          <input type="text" name="email" placeholder="Enter your email" />

          <label for="password">Password</label>
          <input
            type="text"
            name="password"
            placeholder="Enter your password"
          />

          <div class="checkbox">
            <input type="checkbox" />
            <p>I agree to the terms & policy</p>
          </div>

          <button class="submit" type="submit">Signup</button>

          <div class="another">
            <button class="media" type="submit">Sign in with Google</button>
            <button class="media" type="submit">Sign in with Apple</button>
          </div>

          <p>Have an account? <a href="index_sign_in.html">Sign In</a></p>
        </form>
      </div>

      <div class="right">
        <img src="img.jpg" alt="img" />
      </div>
    </main>
  </body>
</html>
